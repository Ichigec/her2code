<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F0F23">
<title>Hermes</title>
<link rel="manifest" href="/manifest.json">
<style>
:root {
  --bg:#0F0F23; --surface:#1A1A2E; --surface2:#16213E;
  --primary:#6C5CE7; --primary-light:#A29BFE; --secondary:#00CEC9;
  --text:#E8E8F0; --text-muted:#6E6E8A; --text-dim:#9E9EB8;
  --success:#00E676; --error:#FF5252; --warning:#FFD740;
  --user-bubble:#3D3D5C; --asst-bubble:#1E1E3A; --code-bg:#12122A;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background:var(--bg); color:var(--text); height:100dvh; overflow:hidden;
}
#app { display:flex; flex-direction:column; height:100dvh; }

/* Header */
#header {
  background:var(--surface); padding:8px 12px; display:flex; align-items:center; gap:8px;
  border-bottom:1px solid rgba(255,255,255,0.05); flex-shrink:0;
}
#header h1 { font-size:17px; font-weight:700; color:var(--primary-light); }
.conn-badge { display:flex; align-items:center; gap:4px; font-size:10px; padding:2px 8px; border-radius:10px; background:var(--surface2); }
.conn-badge .dot { width:6px; height:6px; border-radius:50%; }
.conn-badge .dot.ok { background:var(--success); box-shadow:0 0 4px var(--success); }
.conn-badge .dot.err { background:var(--error); }
.spacer { flex:1; }
.icon-btn { width:32px; height:32px; border:none; border-radius:50%; background:var(--surface2); color:var(--primary-light); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

/* Messages */
#messages { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:6px; -webkit-overflow-scrolling:touch; }
@media (min-width:768px) { #messages { max-width:800px; align-self:center; width:100%; } }
.msg { display:flex; flex-direction:column; max-width:88%; animation:fadeIn 0.2s; }
.msg.user { align-self:flex-end; } .msg.assistant { align-self:flex-start; }
.msg-bubble { padding:10px 14px; line-height:1.5; font-size:15px; word-break:break-word; }
.msg.user .msg-bubble { background:var(--user-bubble); border-radius:16px 16px 4px 16px; }
.msg.assistant .msg-bubble { background:var(--asst-bubble); border-radius:4px 16px 16px 16px; }

/* Input */
#input-bar { background:var(--surface); padding:8px 10px calc(8px + var(--safe-bottom)); display:flex; gap:8px; align-items:flex-end; border-top:1px solid rgba(255,255,255,0.05); }
#msg-input { flex:1; background:var(--surface2); border:1px solid var(--text-muted); border-radius:20px; padding:8px 14px; color:var(--text); font-size:15px; resize:none; min-height:40px; max-height:120px; outline:none; }
#msg-input:focus { border-color:var(--primary); }
#send-btn { width:40px; height:40px; border-radius:50%; border:none; background:var(--primary); color:white; font-size:18px; cursor:pointer; }
#send-btn:disabled { opacity:0.3; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>⚡ Hermes</h1>
    <span class="conn-badge"><span class="dot" id="dot-h"></span><span id="txt-h">---</span></span>
    <div class="spacer"></div>
    <button class="icon-btn" onclick="switchBackend()" title="Switch">⇆</button>
  </div>
  <div id="messages"><div class="msg"><div class="msg-bubble" style="color:var(--text-muted);text-align:center;width:100%">Connected. Start a conversation.</div></div></div>
  <div id="input-bar">
    <textarea id="msg-input" rows="1" placeholder="Message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button id="send-btn" onclick="send()" disabled>↑</button>
  </div>
</div>
<script>
// Minimal state — fill in hermesUrl, hermesKey for your environment
const S = {
  backend:'hermes',
  hUrl:'http://HERMES_HOST:8642',  // ← REPLACE with actual Hermes API server address
  hKey:'API_SERVER_KEY',            // ← REPLACE from ~/.hermes/.env
  hModel:'hermes-agent',
  oUrl:'http://OPENCODE_HOST:3400', // ← REPLACE with actual OpenCode+ address
  messages:[], streaming:false
};
function checkConn() {
  const url = S.backend==='hermes' ? S.hUrl+'/health' : S.oUrl+'/global/health';
  fetch(url).then(r=>{
    document.getElementById('dot-h').className = 'dot '+(r.ok?'ok':'err');
    document.getElementById('txt-h').textContent = r.ok?'Connected':'Disconnected';
  }).catch(()=>{
    document.getElementById('dot-h').className = 'dot err';
    document.getElementById('txt-h').textContent = 'Disconnected';
  });
}
function switchBackend() { S.backend=S.backend==='hermes'?'opencode':'hermes'; checkConn(); }
async function send() {
  const inp=document.getElementById('msg-input'), text=inp.value.trim();
  if(!text||S.streaming) return; inp.value='';inp.style.height='auto';
  S.messages.push({id:Date.now(),role:'user',content:text});
  render(); document.getElementById('send-btn').disabled=true;
  // TODO: implement SSE streaming for Hermes, HTTP POST for OpenCode+
  // See references/api-server-protocol.md for full implementation
}
function render() {
  const c=document.getElementById('messages');
  c.innerHTML = S.messages.map(m=>`<div class="msg ${m.role}"><div class="msg-bubble">${m.content||''}</div></div>`).join('');
  c.scrollTop=c.scrollHeight;
}
document.getElementById('msg-input').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';document.getElementById('send-btn').disabled=!this.value.trim();});
checkConn(); setInterval(checkConn,30000);
</script>
</body>
</html>

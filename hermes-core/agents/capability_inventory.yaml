# Capability Inventory — single source of truth for agent capabilities
# Used by G1 Loader at Phase 0 bootstrap
# Updated manually when infrastructure changes, or by G8 Learner from user additions

version: "1.0.0"
generated: "2026-06-25"
updated_by: "plan2 orchestration cycle"

# ============================================================================
# STATIC CAPABILITIES — always available/always unavailable
# ============================================================================
static:
  # --- Core (builtin, always available) ---
  code_write:
    available: true
    source: builtin
    description: "Write code in Python, JS/TS, Bash, Kotlin"
    severity: CRITICAL

  terminal_exec:
    available: true
    source: builtin
    description: "Execute shell commands on Linux host"
    severity: CRITICAL

  file_read:
    available: true
    source: builtin
    description: "Read files from filesystem"
    severity: CRITICAL

  file_write:
    available: true
    source: builtin
    description: "Write/overwrite files"
    severity: CRITICAL

  delegate_task:
    available: true
    source: builtin
    description: "Spawn sub-agents for parallel work"
    severity: CRITICAL

  # --- External services (should be available) ---
  neo4j:
    available: true
    source: system
    check: "curl -s -o /dev/null -w '%{http_code}' -u neo4j:<YOUR_NEO4J_PASSWORD> http://localhost:7474 | grep -q 200"
    description: "Neo4j graph database"
    severity: HIGH
    workaround: "skip Neo4j queries, use file-based storage"

  searchbox_mcp:
    available: true
    source: system
    check: "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8024/mcp | grep -q 200"
    description: "Multi-engine search via MCP"
    severity: HIGH
    workaround: "use terminal curl for direct searches"

  # --- Media tools ---
  ffmpeg:
    available: true
    source: system
    path: "/usr/bin/ffmpeg"
    check: "which ffmpeg >/dev/null 2>&1"
    description: "Audio/video processing"
    severity: MEDIUM

  imagemagick:
    available: true
    source: system
    path: "/usr/bin/identify"
    check: "which identify >/dev/null 2>&1"
    description: "Image format/structure validation"
    severity: MEDIUM

  adb:
    available: true
    source: system
    path: "/home/user/Android/Sdk/platform-tools/adb"
    check: "test -x /home/user/Android/Sdk/platform-tools/adb"
    description: "Android device bridge"
    severity: HIGH
    workaround: "cannot test on phone; use emulator or skip phone tests"

  # --- GAPS — capabilities agent does NOT have ---
  vision:
    available: false
    source: none
    description: "Cannot see/analyze images visually"
    severity: CRITICAL
    workaround: "imagemagick identify for structural validation, user for visual check"
    resolution_strategy: structural_validation

  browser_gui:
    available: false
    source: none
    description: "Cannot open browser with GUI (no $DISPLAY on server)"
    severity: HIGH
    workaround: "curl for HTTP checks, headless testing via terminal"
    resolution_strategy: tool_workaround

  web_fetch:
    available: false
    source: none
    description: "Cannot fetch arbitrary web pages"
    severity: HIGH
    workaround: "curl -sL for text extraction, searchbox MCP for search"
    resolution_strategy: tool_workaround

  web_search:
    available: false
    source: none
    description: "No web_search tool available"
    severity: HIGH
    workaround: "searchbox MCP for search, curl for page fetch"
    resolution_strategy: tool_workaround

  audio_play:
    available: false
    source: none
    description: "Cannot play audio directly"
    severity: MEDIUM
    workaround: "write audio file, user plays manually"
    resolution_strategy: delegate_to_user

# ============================================================================
# DYNAMIC CAPABILITIES — checked at runtime via live probes
# ============================================================================
dynamic:
  cuda:
    check: "python3 -c 'import ctranslate2; print(ctranslate2.get_cuda_device_count())' 2>/dev/null || echo 0"
    expected: "0"
    description: "CUDA GPU availability for ML inference"
    severity: MEDIUM
    workaround: "CPU-only inference (slower but functional)"
    timeout_seconds: 10

  docker:
    check: "docker info >/dev/null 2>&1 && echo 1 || echo 0"
    expected: "1"
    description: "Docker daemon availability"
    severity: HIGH
    workaround: "local process instead of container, or skip containerized steps"
    timeout_seconds: 5

  git:
    check: "git rev-parse --git-dir 2>/dev/null && echo 1 || echo 0"
    expected: "1"
    description: "Git repository for worktree isolation"
    severity: HIGH
    workaround: "in-place work (higher conflict risk), documented in deviation log"
    timeout_seconds: 3

  venv:
    check: "test -f /home/user/.hermes/hermes-agent/venv/bin/python3 && echo 1 || echo 0"
    expected: "1"
    description: "Hermes Python virtual environment"
    severity: CRITICAL
    workaround: "use system python3 (may miss dependencies)"
    timeout_seconds: 2


# ============================================================================
# COMPOSITION RULES — derived gaps from tool combinations
# ============================================================================
composition_rules:
  - name: "phone_test_requires_adb"
    description: "Testing on phone requires ADB availability"
    required: [terminal_exec, adb]
    produces: "phone_test"
    severity: CRITICAL

  - name: "screenshot_verification_requires_vision"
    description: "Verifying screenshots requires vision capability"
    required: [vision]
    produces: "screenshot_verification"
    severity: CRITICAL

  - name: "web_ui_test_requires_browser"
    description: "Testing web UI requires browser GUI"
    required: [browser_gui]
    produces: "web_ui_test"
    severity: HIGH

  - name: "container_build_requires_docker"
    description: "Building containers requires Docker daemon"
    required: [docker]
    produces: "container_build"
    severity: HIGH

  - name: "gpu_inference_requires_cuda"
    description: "GPU-accelerated inference requires CUDA"
    required: [cuda]
    produces: "gpu_inference"
    severity: MEDIUM

  - name: "audio_generation_requires_ffmpeg"
    description: "Audio file generation requires ffmpeg"
    required: [ffmpeg]
    produces: "audio_generation"
    severity: MEDIUM

  - name: "image_validation_requires_imagemagick_or_vision"
    description: "Image validation needs either imagemagick (structural) or vision (visual)"
    any_of: [imagemagick, vision]
    produces: "image_validation"
    severity: HIGH

# ============================================================================
# BACCM INTERVIEW TEMPLATE (G3 TaskInterviewer)
# ============================================================================
baccm_template:
  version: "1.0.0"
  questions:
    change:
      prompt: "Что изменится в системе после выполнения этой задачи?"
      extracts: "artifact_type"
    need:
      prompt: "Что должна уметь делать система/агент для выполнения?"
      extracts: "required_tools"
    solution:
      prompt: "Как именно будет решаться задача? Какие шаги?"
      extracts: "concrete_commands"
    stakeholder:
      prompt: "Кто будет проверять результат? Человек или автотесты?"
      extracts: "verification_method"
    value:
      prompt: "Как измерить успех? Какие критерии приёмки?"
      extracts: "acceptance_criteria"
    context:
      prompt: "Какие есть ограничения среды? Платформа, доступность сервисов?"
      extracts: "platform_constraints"

# ============================================================================
# SEVERITY TAXONOMY
# ============================================================================
severity_levels:
  BLOCKER:
    code: B
    description: "Phase CANNOT start without this capability"
    gate_behavior: "threshold=1.0 — all BLOCKER checks must PASS"
  CRITICAL:
    code: C
    description: "Phase starts degraded. Fix within 1 cycle or escalate"
    gate_behavior: "threshold=0.8 — max 20% CRITICAL failures tolerated"
  HIGH:
    code: H
    description: "Phase proceeds with warning. Fix before downstream phase"
    gate_behavior: "threshold=0.6 — reported in audit"
  MEDIUM:
    code: M
    description: "Advisory. Captured in observer checkpoints"
    gate_behavior: "non-blocking, logged"
  WARN:
    code: W
    description: "Informational only. No action required"
    gate_behavior: "non-blocking"

# ============================================================================
# RESOLUTION STRATEGIES (ordered by preference)
# ============================================================================
resolution_strategies:
  - name: tool_workaround
    description: "Use alternative tools to achieve same goal"
    example: "vision → imagemagick identify for structural validation"
  - name: structural_validation
    description: "Validate structure/metadata without full capability"
    example: "Check image format/size without seeing it"
  - name: delegate_to_user
    description: "Ask user to perform the check manually"
    example: "Visual verification: user checks screenshot"
  - name: delegate_to_capable_agent
    description: "Route to sub-agent that has the capability"
    example: "Dev without adb → Dev with adb"
  - name: replan_around_gap
    description: "Replan using a different approach that doesn't need this capability"
    example: "No Docker → local process instead of container"
  - name: accept_risk
    description: "Accept that verification cannot be done, document as limitation"
    example: "Cannot verify visually, relying on structural checks"
  - name: retry_with_backoff
    description: "Transient failure → retry after cooldown"
    example: "Network timeout → retry in 30s"
  - name: defer_to_next_cycle
    description: "Requires infrastructure change → schedule for next sprint"
    example: "GPU needed → order hardware, defer"

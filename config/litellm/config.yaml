# LiteLLM Proxy конфиг: единый OpenAI v1 gateway для UI-клиентов.
# OpenWebUI (и любые другие OpenAI-совместимые клиенты — OpenHands, opencode, Claw Code)
# ходят в LiteLLM, а сам LiteLLM проксирует в host-side LM Studio / llama.cpp / LocalAI /
# vLLM (или другие источники, если добавить alias ниже). Phoenix callback публикует span'ы
# запросов в Phoenix, так что добавление новых model_name не меняет tracing-границу для клиентов.

model_list:
  # ── Audio models proxied to LocalAI through the same LiteLLM gateway ────────
  # LocalAI v4 holds the actual STT/TTS/VAD backends as plugin OCI images
  # (see localai-start.sh → ensure_backends). The aliases below stay stable
  # so OpenWebUI Admin Panel and .env.openwebui never need to know which
  # concrete LocalAI model id is wired underneath. A/B winner is promoted
  # to `tts-ru-default`; the runner-up keeps the `tts-ru-alt` alias.
  - model_name: "stt-whisper-cuda-turbo"
    litellm_params:
      model: "openai/whisper-large-turbo-q5_0"
      api_base: "os.environ/LOCALAI_API_BASE"
      api_key: "os.environ/LOCALAI_API_KEY"
    model_info:
      mode: audio_transcription

  # A/B winner 2026-05 (выбран по blind listening на 18-словном RU-тексте):
  # Qwen3-TTS-1.7B. Голос более естественный чем 0.6B, без явного «робото-
  # фоновой» окраски. Hot-cache ~3.2 с через LiteLLM, ~2.7 с напрямую,
  # cold-start ~41 с. VRAM ~4.4 ГБ. Работает рядом с LM Studio (73 ГБ
  # unified) благодаря PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
  # и LOCALAI_SINGLE_ACTIVE_BACKEND=true (см. compose.localai.yml).
  # Каверзный артефакт на длинных текстах: модель может вставлять
  # вокализы вроде «Эх...» в начале — если критично, переключайте на
  # tts-ru-alt (0.6B) или tts-piper-ru-fallback (без галлюцинаций).
  - model_name: "tts-ru-default"
    litellm_params:
      model: "openai/qwen3-tts-1.7b-custom-voice"
      api_base: "os.environ/LOCALAI_API_BASE"
      api_key: "os.environ/LOCALAI_API_KEY"
    model_info:
      mode: audio_speech

  # Same backend (qwen-tts), 0.6B весов — компактнее (~2.6 ГБ VRAM),
  # читает тексты буквальнее (без вокализных вставок), но голос слышимо
  # более «роботизированный». Hot-cache ~5.8 с через LiteLLM.
  - model_name: "tts-ru-alt"
    litellm_params:
      model: "openai/qwen3-tts-0.6b-custom-voice"
      api_base: "os.environ/LOCALAI_API_BASE"
      api_key: "os.environ/LOCALAI_API_KEY"
    model_info:
      mode: audio_speech

  # Reserved for fish-speech when upstream backend image stops shipping with a
  # broken Python module (currently: "No module named fish_speech.inference_engine").
  # Backend is installed (cuda13-nvidia-l4t-arm64-fish-speech), only the model
  # registration is held back. Uncomment after re-pulling the backend image.
  # - model_name: "tts-ru-fish"
  #   litellm_params:
  #     model: "openai/fish-speech-1.5"
  #     api_base: "os.environ/LOCALAI_API_BASE"
  #     api_key: "os.environ/LOCALAI_API_KEY"
  #   model_info:
  #     mode: audio_speech

  - model_name: "tts-piper-ru-fallback"
    litellm_params:
      model: "openai/voice-ru_RU-irina-medium"
      api_base: "os.environ/LOCALAI_API_BASE"
      api_key: "os.environ/LOCALAI_API_KEY"
    model_info:
      mode: audio_speech

  # Deprecated: kept until existing chats stop referencing the legacy ids.
  # Backed by stale LocalAI YAML registrations whose backends are no longer
  # the recommended choice (qwen-tts backend → superseded by faster-qwen3-tts;
  # whisper-large-v3-turbo file → superseded by quantized whisper-large-turbo-q5_0).
  - model_name: "stt-whisper-large-v3-turbo"
    litellm_params:
      model: "openai/stt-whisper-large-v3-turbo"
      api_base: "os.environ/LOCALAI_API_BASE"
      api_key: "os.environ/LOCALAI_API_KEY"
    model_info:
      mode: audio_transcription

  - model_name: "tts-qwen3-1.7b"
    litellm_params:
      model: "openai/tts-qwen3-1.7b"
      api_base: "os.environ/LOCALAI_API_BASE"
      api_key: "os.environ/LOCALAI_API_KEY"
    model_info:
      mode: audio_speech
      health_check_voice: Aiden

  # Stable public alias (STACK_DEFAULT_LITELLM_CHAT_MODEL, Claw, OpenHands, opencode+).
  # Routed to host llama-server (opencode+/start-llama-qwen.sh, default :8092).
  # Phoenix traces: LiteLLM success_callback → arize_phoenix (compose.phoenix.yml).
  - model_name: "qwen3.6-35b-heretic"
    litellm_params:
      model: "openai/qwen3.6-35b-heretic"
      api_base: "os.environ/LLAMA_CPP_API_BASE"
      api_key: "os.environ/LLAMA_CPP_API_KEY"

  # Same upstream as the short alias; id matches opencode `litellm/qwen3.6-35b-heretic`.
  - model_name: "openai/qwen3.6-35b-heretic"
    litellm_params:
      model: "openai/qwen3.6-35b-heretic"
      api_base: "os.environ/LLAMA_CPP_API_BASE"
      api_key: "os.environ/LLAMA_CPP_API_KEY"

  # Pattern B: OpenAI-compatible micro-proxy on llm-stack-net (compose.phoenix.yml →
  # openai-stack-relay). LiteLLM → relay → LiteLLM with a fixed upstream model id.
  - model_name: "stack-openai-relay-qwen36"
    litellm_params:
      model: "openai/qwen3.6-35b-heretic"
      api_base: "http://openai-stack-relay:8088/v1"
      api_key: "os.environ/LITELLM_MASTER_KEY"

  # ── Agent-mesh Track 2 (LiteLLM as A2A gateway) ────────────────────────────
  # Two agent-as-tool aliases backed by the real adapters in
  # compose.agents-mesh.yml. Each maps to one POST /v1/run on the adapter; we
  # do NOT speak OpenAI chat-completions here — the alias exists so that
  # LLM-facing clients can name an agent by id and have LiteLLM dispatch to
  # the adapter (master_key gates auth at the LiteLLM edge; the adapter's
  # own bearer is set via os.environ/*_ADAPTER_API_KEY).
  #
  # The LiteLLM A2A Agent Gateway feature (https://docs.litellm.ai/docs/a2a)
  # is currently beta in v1.83.x and is most reliably configured via the
  # Admin UI (see docs/agent-mesh.md → «A2A registration»). The yaml block
  # below is the «source of truth» mirror so that a fresh DB / `STORE_MODEL_
  # IN_DB=False` deployment still routes to the same backend. Comment-out the
  # entries if you keep registrations exclusively in the Admin UI.
  - model_name: "agent/clawcode"
    litellm_params:
      model: "openai/clawcode-adapter"
      api_base: "http://clawcode-adapter:8790/v1"
      api_key: "os.environ/CLAWCODE_ADAPTER_API_KEY"
      timeout: 1200
      request_timeout: 1200
      max_retries: 0
    model_info:
      mode: agent
      description: >-
        Headless Claw Code (Rust CLI) delegated as a tool via
        clawcode-adapter (compose.agents-mesh.yml). One call = one task.
        Cycle guard: X-Agent-Mesh-Depth ≥ MAX_NESTED_AGENT_CALLS → refused.

  - model_name: "agent/openhands"
    litellm_params:
      model: "openai/openhands-adapter"
      api_base: "http://openhands-adapter:8791/v1"
      api_key: "os.environ/OPENHANDS_ADAPTER_API_KEY"
      timeout: 3600
      request_timeout: 3600
      max_retries: 0
    model_info:
      mode: agent
      description: >-
        Headless OpenHands 1.6 delegated as a tool via openhands-adapter
        (compose.agents-mesh.yml). Each call spawns one ephemeral runtime
        sandbox via docker.sock. Cycle guard: X-Agent-Mesh-Depth ≥
        MAX_NESTED_AGENT_CALLS → refused.

  - model_name: "agent/opencode"
    litellm_params:
      model: "openai/opencode-adapter"
      api_base: "http://opencode-adapter:8798/v1"
      api_key: "os.environ/OPENCODE_ADAPTER_API_KEY"
      timeout: 1200
      request_timeout: 1200
      max_retries: 0
    model_info:
      mode: agent
      description: >-
        opencode (https://opencode.ai/) bridged via ACP (JSON-RPC over
        `docker exec opencode opencode acp` stdio) and exposed as A2A.
        One call = one ACP prompt turn (session/new + session/prompt).
        Cycle guard: X-Agent-Mesh-Depth ≥ MAX_NESTED_AGENT_CALLS → refused.

  # Direct passthrough aliases for all models currently published by LM Studio.
  - model_name: "tvall43-qwen3.6-35b-a3b-heretic"

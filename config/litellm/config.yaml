mcp_servers:
  # Native MCP endpoint from compose.searchbox.yml. LiteLLM clients can use it
  # through the proxy MCP gateway, e.g. server_url="litellm_proxy/mcp/searchbox".
  # OpenWebUI still uses the OpenAPI bridge on searchbox:8001 separately.
  searchbox:
    url: "http://searchbox:8090/mcp"
    transport: "http"
    available_on_public_internet: false
    description: >-
      Multi-engine local search MCP server: SearXNG, Wikipedia/Wikidata,
      arXiv, GitHub, Hacker News, StackExchange, Crossref/OpenAlex,
      PyPI/NPM, DuckDuckGo, and optional Brave/Google/Tavily.
    allowed_tools:
      - search
      - search_searxng
      - search_wikipedia
      - search_wikidata
      - search_arxiv
      - search_github
      - search_hackernews
      - search_stackexchange
      - search_crossref
      - search_openalex
      - search_pypi
      - search_npm
      - search_duckduckgo
      - search_brave
      - search_google
      - search_tavily
      - list_engines
      - search_status

litellm_settings:
  success_callback: ["arize_phoenix"]
  failure_callback: ["arize_phoenix"]
  # drop_params=false: пропускаем нестандартные OpenAI-параметры (chat_template_kwargs,
  # extra_body) в backend — нужно для per-request enable_thinking у Qwen3.6
  # (llama.cpp поддерживает в теле; LM Studio пока игнорирует, но не падает).
  drop_params: false

environment_variables:
  PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:6006
  # Phoenix project shared with the agent-mesh adapters so that the
  # Track 2 (A2A) and Track 1 (tool-mode) spans land in one place. The
  # adapters set the same project via PHOENIX_PROJECT_NAME in compose.agents-mesh.yml.
  PHOENIX_PROJECT_NAME: qwen3.6-heretic

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

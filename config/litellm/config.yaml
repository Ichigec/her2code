  # vLLM lane: контейнер запускается с `--served-model-name gemma-4-26B-lowmem`
  # и слушает host:8000. LiteLLM видит его как http://host.docker.internal:8000/v1.
  # Алиас можно держать прописанным постоянно — пока vLLM грузит веса, запросы
  # будут падать с 503/connection refused, а как только vLLM поднимется,
  # LiteLLM подхватит без рестарта. Большой timeout нужен на первую горячую
  # генерацию (CUDA graph compile + первый prefill).
  - model_name: "gemma-4-26B-lowmem"

services:
  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
    volumes:
      - neo4j_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - cypher-shell -u neo4j -p "$${NEO4J_PASSWORD:?Set NEO4J_PASSWORD}" "RETURN 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

volumes:
  neo4j_data:

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHANNEL_NAME — AI-канал</title>
    <meta name="description" content="DESCRIPTION_HERE">
    <meta property="og:title" content="CHANNEL_NAME">
    <meta property="og:description" content="DESCRIPTION_HERE">
    <meta property="og:type" content="website">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            line-height: 1.6;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 48px 40px;
            max-width: 540px;
            width: 100%;
            text-align: center;
        }
        .logo {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #58a6ff, #3fb950);
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
        }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        .subtitle { color: var(--text-dim); font-size: 15px; margin-bottom: 32px; }
        .features {
            display: flex; flex-wrap: wrap; gap: 8px;
            justify-content: center; margin-bottom: 32px;
        }
        .tag {
            background: rgba(88,166,255,0.1);
            border: 1px solid rgba(88,166,255,0.2);
            color: var(--accent);
            padding: 6px 14px; border-radius: 20px; font-size: 13px;
        }
        .cta {
            display: inline-flex; align-items: center; gap: 10px;
            background: var(--accent); color: #fff;
            border: none; padding: 16px 36px; border-radius: 10px;
            font-size: 17px; font-weight: 600; cursor: pointer;
            text-decoration: none;
        }
        .cta:hover { background: var(--accent-hover); }
        .stats {
            display: flex; gap: 32px; justify-content: center;
            margin-top: 32px; padding-top: 24px;
            border-top: 1px solid var(--border);
        }
        .stat-val { font-size: 24px; font-weight: 700; }
        .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; }
        .footer { margin-top: 24px; color: var(--text-dim); font-size: 13px; }
        .utm-debug { margin-top: 12px; font-size: 11px; color: var(--text-dim); opacity: 0.6; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🧠</div>
        <h1>CHANNEL_NAME</h1>
        <p class="subtitle">CHANNEL_DESCRIPTION</p>
        <div class="features">
            <span class="tag">🏷️ Topic 1</span>
            <span class="tag">🏷️ Topic 2</span>
            <span class="tag">🏷️ Topic 3</span>
        </div>
        <a href="https://t.me/CHANNEL_NAME" class="cta"
           onclick="trackClick(); return true;">
            Подписаться в Telegram
        </a>
        <div class="utm-debug" id="utm-debug"></div>
        <div class="stats">
            <div><div class="stat-val">AI</div><div class="stat-label">Тематика</div></div>
            <div><div class="stat-val">~1K</div><div class="stat-label">Подписчиков</div></div>
            <div><div class="stat-val">RU</div><div class="stat-label">Язык</div></div>
        </div>
    </div>
    <div class="footer">© CHANNEL_NAME · <a href="https://t.me/CHANNEL_NAME">t.me/CHANNEL_NAME</a></div>

    <!-- ⚠️ REPLACE XXXXXXXX WITH YANDEX METRIKA COUNTER ID -->
    <script>
       (function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
       m[i].l=1*new Date();k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)})
       (window,document,"script","https://mc.yandex.ru/metrika/tag.js","ym");
       ym(XXXXXXXX,"init",{clickmap:true,trackLinks:true,accurateTrackBounce:true,webvisor:true});
    </script>
    <noscript><img src="https://mc.yandex.ru/watch/XXXXXXXX" style="position:absolute;left:-9999px" alt=""/></noscript>

    <script>
        const params = new URLSearchParams(window.location.search);
        const utm = {
            source: params.get('utm_source'),
            medium: params.get('utm_medium'),
            campaign: params.get('utm_campaign'),
            content: params.get('utm_content'),
            term: params.get('utm_term')
        };
        const active = Object.entries(utm).filter(([_,v]) => v);
        if (active.length) {
            document.getElementById('utm-debug').textContent =
                'UTM: ' + active.map(([k,v]) => `${k}=${v}`).join(', ');
            sessionStorage.setItem('utm_data', JSON.stringify(utm));
        }
        function trackClick() {
            if (typeof ym !== 'undefined') {
                ym(XXXXXXXX, 'reachGoal', 'tg_subscribe');
                if (utm.source) ym(XXXXXXXX, 'params', utm);
            }
        }
    </script>
</body>
</html>

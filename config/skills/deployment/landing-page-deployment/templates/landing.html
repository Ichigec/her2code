<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{CHANNEL_TITLE}}</title>
    <meta name="description" content="{{CHANNEL_DESCRIPTION}}">
    <meta property="og:title" content="{{CHANNEL_TITLE}}">
    <meta property="og:description" content="{{CHANNEL_DESCRIPTION}}">
    <meta property="og:type" content="website">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            line-height: 1.6;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 48px 40px;
            max-width: 540px;
            width: 100%;
            text-align: center;
        }
        .logo { width:80px; height:80px; background:linear-gradient(135deg,#58a6ff,#3fb950); border-radius:20px; margin:0 auto 24px; display:flex; align-items:center; justify-content:center; font-size:36px; }
        h1 { font-size:28px; font-weight:700; margin-bottom:8px; }
        .subtitle { color:var(--text-dim); font-size:15px; margin-bottom:32px; }
        .features { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:32px; }
        .tag { background:rgba(88,166,255,.1); border:1px solid rgba(88,166,255,.2); color:var(--accent); padding:6px 14px; border-radius:20px; font-size:13px; white-space:nowrap; }
        .cta { display:inline-flex; align-items:center; gap:10px; background:var(--accent); color:#fff; border:none; padding:16px 36px; border-radius:10px; font-size:17px; font-weight:600; cursor:pointer; text-decoration:none; transition:background .2s,transform .15s; }
        .cta:hover { background:var(--accent-hover); transform:translateY(-1px); }
        .stats { display:flex; gap:32px; justify-content:center; margin-top:32px; padding-top:24px; border-top:1px solid var(--border); }
        .stat-val { font-size:24px; font-weight:700; }
        .stat-label { font-size:12px; color:var(--text-dim); text-transform:uppercase; }
        .footer { margin-top:24px; color:var(--text-dim); font-size:13px; }
        .utm-debug { margin-top:12px; font-size:11px; color:var(--text-dim); opacity:.6; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">{{EMOJI}}</div>
        <h1>{{CHANNEL_NAME}}</h1>
        <p class="subtitle">{{CHANNEL_DESCRIPTION}}</p>
        <div class="features">{{TAGS}}</div>
        <a href="https://t.me/{{CHANNEL_USERNAME}}" class="cta" onclick="trackClick();return true;">
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.79 8.14l-1.82 8.59c-.14.62-.51.77-1.03.48l-2.85-2.1-1.38 1.33c-.15.15-.28.28-.57.28l.2-2.93 5.35-4.83c.23-.2-.05-.32-.36-.12L8.11 13.3l-2.69-.84c-.58-.18-.59-.58.12-.86l10.46-4.03c.49-.18.92.12.76.85l.03-.28z"/></svg>
            Подписаться в Telegram
        </a>
        <div class="utm-debug" id="utm-debug"></div>
        <div class="stats">{{STATS}}</div>
    </div>
    <div class="footer">&copy; {{CHANNEL_NAME}} &middot; <a href="https://t.me/{{CHANNEL_USERNAME}}">t.me/{{CHANNEL_USERNAME}}</a></div>

    <!-- Yandex.Metrika counter -->
    <script>
       (function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
       m[i].l=1*new Date();
       for(var j=0;j<document.scripts.length;j++){if(document.scripts[j].src===r){return;}}
       k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)})
       (window,document,"script","https://mc.yandex.ru/metrika/tag.js","ym");
       ym(XXXXXXXX,"init",{clickmap:true,trackLinks:true,accurateTrackBounce:true,webvisor:true});
    </script>
    <noscript><div><img src="https://mc.yandex.ru/watch/XXXXXXXX" style="position:absolute;left:-9999px" alt=""/></div></noscript>

    <script>
        const p=new URLSearchParams(location.search);
        const utm={source:p.get('utm_source'),medium:p.get('utm_medium'),campaign:p.get('utm_campaign'),content:p.get('utm_content'),term:p.get('utm_term')};
        const a=Object.entries(utm).filter(([_,v])=>v);
        if(a.length){document.getElementById('utm-debug').textContent='UTM: '+a.map(([k,v])=>`${k}=${v}`).join(', ');sessionStorage.setItem('utm_data',JSON.stringify(utm));}
        function trackClick(){if(typeof ym!=='undefined'){ym(XXXXXXXX,'reachGoal','tg_subscribe');if(utm.source)ym(XXXXXXXX,'params',{utm_source:utm.source,utm_medium:utm.medium,utm_campaign:utm.campaign,utm_content:utm.content,utm_term:utm.term});}}
    </script>
</body>
</html>

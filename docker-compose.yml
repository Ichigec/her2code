services:
  hermes:
    build: ./hermes-agent
    image: hermes-agent
    container_name: hermes-test
    restart: unless-stopped
    network_mode: host
    # volumes:
    #   - ~/.hermes-docker:/opt/data
    environment:
      - HERMES_UID=1000
      - HERMES_GID=1000
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=18648
      - API_SERVER_KEY=${API_SERVER_KEY:-sk-local}
      - GATEWAY_ALLOW_ALL_USERS=true
      - HERMES_DISABLE_MESSAGING=1
      - CUSTOM_PROVIDER_BASE_URL=http://localhost:8092/v1
      - CUSTOM_PROVIDER_API_KEY=***      - CUSTOM_PROVIDER_NAME=llama
      - OPENROUTER_API_KEY
      - DEEPSEEK_API_KEY
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:18648/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s
    command:
      - gateway
      - run
